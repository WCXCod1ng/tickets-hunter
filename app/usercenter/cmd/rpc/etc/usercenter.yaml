Name: usercenter.rpc
ListenOn: 0.0.0.0:8080
Etcd:
  Hosts:
    - 127.0.0.1:2379
    - 127.0.0.1:22379
    - 127.0.0.1:32379
  Key: usercenter.rpc

DB:
  DataSource: root:wang@tcp(127.0.0.1:3306)/tickets_hunter?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai

Snowflake:
  StartTime: 2026-01-01
  WorkerId: 1

# UserCache配置
UserCache:
  - Host: 127.0.0.1:6379
    Type: node        # node | cluster
    Pass: ""          # 没密码就留空

    # 正常数据的过期时间
    # 默认为 7 天。支持 s, m, h, d 单位。
    # 对于用户信息，建议设置 1 天或 7 天，因为用户信息变动不频繁
    Expiry: 24h

    # 空值（防穿透）的过期时间：当 DB 查不到数据时，缓存一个空标记（针对缓存穿透）
    # 建议保持较短，防止占着坑位（万一用户真的注册了）
    NotFoundExpiry: 1m


Timeout: 10000

