Name: order.rpc
ListenOn: 0.0.0.0:8082
Etcd:
  Hosts:
    - 127.0.0.1:2379
    - 127.0.0.1:22379
    - 127.0.0.1:32379
  Key: order.rpc

TicketRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
      - 127.0.0.1:22379
      - 127.0.0.1:32379
    Key: ticket.rpc
  Timeout: 60000

Snowflake:
  StartTime: 2026-01-01
  WorkerId: 1

DB:
  DataSource: root:wang@tcp(127.0.0.1:3306)/tickets_hunter?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai

# Redis配置
Redis:
  Host: 127.0.0.1:6379
  Type: node        # node | cluster
  Pass: ""          # 没密码就留空
  Key: ticket           # key 前缀

Timeout: 60000

KqPusherConf:
  Brokers:
    - 127.0.0.1:9092
  Topic: order-create-topic

Log:
  ServiceName: order-rpc
  Level: debug
#  Mode: file
  Encoding: json        # plain | json
  Path: logs             # 日志目录
  KeepDays: 7
  MaxSize: 100           # MB
  StackCooldownMillis: 100
