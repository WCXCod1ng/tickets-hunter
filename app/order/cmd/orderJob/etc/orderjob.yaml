Name: orderjob.rpc
ListenOn: 0.0.0.0:8079
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: orderjob.rpc

TicketRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
      - 127.0.0.1:22379
      - 127.0.0.1:32379
    Key: ticket.rpc
  Timeout: 60000

DB:
  DataSource: root:wang@tcp(127.0.0.1:3306)/tickets_hunter?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai

# Redis配置
Redis:
  Host: 127.0.0.1:6379
  Type: node        # node | cluster
  Pass: ""          # 没密码就留空
  Key: ticket           # key 前缀

# go-zero 原生的 Kafka 消费者配置 (kq)
Kafka:
  Name: "kqConsumer"
  Brokers:
    - 127.0.0.1:9092 # 填你 docker-compose 里的 Kafka 地址
  Group: order-create-group
  Topic: order-create-topic
  Offset: first
  Consumers: 4            # 并发消费的 Goroutine 数量，提高削峰处理能力

# 日志配置
Log:
  ServiceName: orderjob
  Level: debug
  Encoding: plain        # plain | json
  Path: logs             # 日志目录
  KeepDays: 7
  MaxSize: 100           # MB
  StackCooldownMillis: 100
