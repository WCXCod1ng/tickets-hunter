syntax = "proto3";

package ticket;

option go_package = "ticket/rpc";
import "validate/rpcvalidate.proto";


// ==========================================
// 1. 公共实体 Message
// ==========================================

// 演唱会场次信息
message EventInfo {
  int64 id = 1;
  string title = 2;
  string cover_url = 3;
  string show_time = 4;
  string venue = 5;
  string sale_start_time = 6;
  string sale_end_time = 7;
  int64 status = 8;
}

// 座位信息
message SeatInfo {
  int64 id = 1;
  int64 seat_type = 2;  // 座位类型: 1普通 2VIP 3内场
  string section = 3;   // 区域
  int64 row_no = 4;     // 排号
  int64 seat_no = 5;    // 座位号
  int64 price = 6;     // 价格 (用int64分来表示金额)
  int64 status = 7;     // 状态: 0可选, 1锁定(未支付), 2已售(已出票)
  int64 seat_index = 8; // 同一个区域内的座位索引
}


// ==========================================
// 2. 请求与响应 Message
// ==========================================

// 2.1 获取场次列表
message GetEventListReq {
  // 阶段二暂无参数，预留空结构体以便后续扩展(如分页、搜索)
}

message GetEventListResp {
  repeated EventInfo list = 1;
  int64 total = 2;
}

// 2.2 获取座位列表
message GetSeatListReq {
  // 场次ID，必填且必须大于0
  int64 event_id = 1 [(validate.rules).int64 = {gt: 0}];
}

message GetSeatListResp {
  repeated SeatInfo list = 1;
}

// 2.3 锁定座位 (防超卖核心)
message LockSeatReq {
  int64 event_id = 1 [(validate.rules).int64 = {gt: 0}];
  int64 seat_id = 2 [(validate.rules).int64 = {gt: 0}];
  string order_sn = 3 [(validate.rules).string = {min_len: 1}]; // 订单号，用于锁定座位
  int64 seat_index = 4 [(validate.rules).int64 = {gte: 0}]; // 使用BitMap进行的优化
  string section = 5 [(validate.rules).string = {min_len: 1}];
}

message LockSeatResp {
  bool success = 1;     // 是否锁座成功
}

// 2.4 获取座位信息 (供 Order RPC 内部调用)
message GetSeatInfoReq {
  int64 seat_id = 1 [(validate.rules).int64 = {gt: 0}];
}

// 2.5 有效座位集合缓存预热
message WarmUpValidSeatsReq {
  int64 event_id = 1 [(validate.rules).int64 = {gt: 0}];
}

message WarmUpValidSeatsResp {
  bool success = 1;     // 是否预热成功
}

// 2.6 取消锁定座位 (供 Order RPC 内部调用)
message UnlockSeatReq {
  int64 seat_id = 2 [(validate.rules).int64 = {gt: 0}];
  string order_sn = 3 [(validate.rules).string = {min_len: 1}]; // 订单号，用于解锁座位
  int64 seat_index = 4 [(validate.rules).int64 = {gte: 0}]; // 使用BitMap进行的优化
  string section = 5 [(validate.rules).string = {min_len: 1}];
  int64 event_id = 6 [(validate.rules).int64 = {gt: 0}]; // 场次Id
}

message UnlockSeatResp {
  bool success = 1;     // 是否解锁成功
}

// 2.7 释放座位
message ReleaseSeatReq {
  int64 seat_id = 1 [(validate.rules).int64 = {gt: 0}];
  string order_sn = 2 [(validate.rules).string = {min_len: 1}]; // 订单号，用于释放座位
  int64 seat_index = 4 [(validate.rules).int64 = {gte: 0}]; // 使用BitMap进行的优化
  string section = 5 [(validate.rules).string = {min_len: 1}];
  int64 event_id = 6 [(validate.rules).int64 = {gt: 0}]; // 场次Id
}

message ReleaseSeatResp {
  bool success = 1;     // 是否释放成功
}

// 2.8 获取指定区域的座位状态
message GetSeatBitMapReq {
  int64 event_id = 1 [(validate.rules).int64 = {gt: 0}]; // 场次ID
  string section = 2 [(validate.rules).string = {min_len: 1}]; // 区域信息
}

message GetSeatBitMapResp {
  bytes bitmap = 1; // bitmap信息
}

// ==========================================
// 3. 服务定义 Service
// ==========================================

service TicketService {
  // 获取演唱会场次列表 (供 API 层调用)
  rpc GetEventList(GetEventListReq) returns(GetEventListResp);

  // 获取指定场次的座位图及状态 (供 API 层调用)
  rpc GetSeatList(GetSeatListReq) returns(GetSeatListResp);

  // 锁定座位，只操作Redis
  rpc LockSeat(LockSeatReq) returns(LockSeatResp);

  // 提供完整的锁座操作
  rpc AcquireSeat(LockSeatReq) returns(LockSeatResp);

  // 获取座位信息 (供 Order RPC 内部调用)
  rpc GetSeatInfo(GetSeatInfoReq) returns(SeatInfo);

  // 有效座位集合缓存预热 (内部隐藏接口，实际场景中可能由定时任务调用)
  rpc WarmUpValidSeats(WarmUpValidSeatsReq) returns(WarmUpValidSeatsResp);

  // 取消锁定座位，只操作Redis
  rpc UnlockSeat(UnlockSeatReq) returns(UnlockSeatResp);

  // 释放座位，供订单支付超时或用户取消订单时调用，更新MySQL的座位状态为可选，并删除Redis中的锁定状态
  rpc ReleaseSeat(ReleaseSeatReq) returns(ReleaseSeatResp);

  // 兜底释放座位，差别在于Redis段会调用underwriteUnlockSeat
  rpc UnderwriteReleaseSeat(ReleaseSeatReq) returns(ReleaseSeatResp);

  // 获取BitMap信息
  rpc GetSeatBitMap(GetSeatBitMapReq) returns(GetSeatBitMapResp);
}