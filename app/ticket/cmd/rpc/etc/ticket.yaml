Name: ticket.rpc
ListenOn: 0.0.0.0:8081
Etcd:
  Hosts:
    - 127.0.0.1:2379
    - 127.0.0.1:22379
    - 127.0.0.1:32379
  Key: ticket.rpc

DB:
  DataSource: root:wang@tcp(127.0.0.1:3306)/tickets_hunter?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai

#Snowflake:
#  StartTime: 2026-01-01
#  WorkerId: 1

# TicketCache配置
TicketEventCache:
  - Host: 127.0.0.1:6379
    Type: node        # node | cluster
    Pass: ""          # 没密码就留空

    # 正常数据的过期时间
    Expiry: 24h

    # 空值（防穿透）的过期时间：当 DB 查不到数据时，缓存一个空标记（针对缓存穿透）
    # 建议保持较短，防止占着坑位（万一用户真的注册了）
    NotFoundExpiry: 1m

# Redis配置
Redis:
  Host: 127.0.0.1:6379
  Type: node        # node | cluster
  Pass: ""          # 没密码就留空
  Key: ticket           # key 前缀

# 日志配置
Log:
  ServiceName: ticket-rpc
  Level: debug
#  Model: file
  Encoding: plain        # plain | json
  Path: logs             # 日志目录
  KeepDays: 7
  MaxSize: 100           # MB
  StackCooldownMillis: 100

Timeout: 60000


