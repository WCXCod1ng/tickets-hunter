Name: usercenter-api
Host: 0.0.0.0
Port: 8889

Timeout: 60000

Auth:
  AccessSecret: "dev-secret-key"
  AccessExpire: 3600 # 1小时
  RefreshExpire: 604800 # 7天

TicketRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
      - 127.0.0.1:22379
      - 127.0.0.1:32379
    Key: ticket.rpc
  Timeout: 60000

Redis:
  Host: 127.0.0.1:6379
  Type: node        # node | cluster
  Pass: ""          # 没密码就留空
  Key: ticket   # key 前缀（强烈建议）
